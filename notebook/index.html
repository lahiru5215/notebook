<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Notes Pro | Cloud Sync Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --surface-bg: #f8fafc; 
            --panel-bg: rgba(255, 255, 255, 0.9);
            --brand-primary: #6366f1; 
            --brand-hover: #4f46e5; 
            --danger: #ef4444; 
            --danger-soft: #fee2e2; 
            --text-title: #0f172a; 
            --text-body: #334155; 
            --text-muted: #94a3b8; 
            --border-subtle: #f1f5f9; 
            --accent-soft: #eef2ff; 
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.05); 
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-image: url('image.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            color: var(--text-body); 
            margin: 0; 
            padding: 40px 15px; 
        }
        
        .wrapper { 
            max-width: 1100px; 
            margin: 0 auto; 
            background: var(--panel-bg); 
            border-radius: 28px; 
            box-shadow: var(--shadow-lg); 
            overflow: hidden; 
            border: 1px solid #ffffff; 
            backdrop-filter: blur(10px); 
        }
        
        .header { padding: 30px 45px; background: rgba(255, 255, 255, 0.8); border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 26px; font-weight: 800; background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .action-bar { padding: 35px 45px; background: rgba(255, 255, 255, 0.8); }
        .search-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        #searchBar { width: 100%; max-width: 350px; padding: 12px 20px; border-radius: 14px; border: 2px solid var(--border-subtle); background: #f8fafc; outline: none; transition: 0.3s; }
        
        .input-container { display: flex; gap: 15px; align-items: stretch; margin-bottom: 20px; }
        textarea { flex: 1; padding: 20px; border: 2px solid var(--border-subtle); border-radius: 20px; font-size: 16px; outline: none; background: #f8fafc; resize: none; min-height: 100px; }
        .btn-side-add { width: 160px; background: var(--brand-primary); color: white; border: none; border-radius: 20px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25); }
        .btn-side-add:disabled { background: #94a3b8; }
        
        .upload-zone { background: rgba(241, 245, 249, 0.8); padding: 15px 25px; border-radius: 18px; border: 2px dashed #cbd5e1; display: flex; justify-content: space-between; align-items: center; }
        button { padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; display: flex; align-items: center; gap: 8px; }
        .btn-attach { background: #10b981; color: white; }
        .btn-outline { background: #fff; border: 2px solid var(--border-subtle); color: var(--text-body); }
        .btn-delete { background: var(--danger-soft); color: var(--danger); padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 700; }
        
        .table-container { padding: 0 45px 45px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { text-align: left; padding: 15px 20px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; }
        .note-row td { background: rgba(255, 255, 255, 0.9); padding: 20px; border-top: 1px solid var(--border-subtle); border-bottom: 1px solid var(--border-subtle); }
        .note-row td:first-child { border-left: 1px solid var(--border-subtle); border-top-left-radius: 15px; border-bottom-left-radius: 15px; color: var(--text-muted); font-size: 13px; }
        .note-row td:last-child { border-right: 1px solid var(--border-subtle); border-top-right-radius: 15px; border-bottom-right-radius: 15px; }
        
        .file-box { background: #f0fdf4; border: 1px solid #dcfce7; border-radius: 14px; padding: 15px; margin-top: 10px; }
        .progress-container { width: 200px; background: #e2e8f0; border-radius: 10px; height: 8px; display: none; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--brand-primary); width: 0%; transition: 0.3s; }
        .pdf-mode .action-bar, .pdf-mode .hide-pdf { display: none !important; }
    </style>
</head>
<body>
<div class="wrapper" id="captureRegion">
    <div class="header">
        <h1>Smart Notes Pro <span>✨</span></h1>
        <button class="btn-outline hide-pdf" onclick="exportPDF()">Export PDF Report</button>
    </div>

    <div class="action-bar hide-pdf">
        <div class="search-section">
            <input type="text" id="searchBar" onkeyup="searchTable()" placeholder="සොයන්න (Search)...">
            <div id="entryCount" style="font-size: 13px; color: var(--brand-primary); font-weight: 800; background: var(--accent-soft); padding: 6px 15px; border-radius: 10px;">0 Entries</div>
        </div>

        <div class="input-container">
            <textarea id="noteInput" placeholder="සටහන හෝ Link එක මෙතන ටයිප් කරන්න..."></textarea>
            <button id="addBtn" class="btn-side-add" onclick="saveNote()">Add Note</button>
        </div>
        
        <div class="upload-zone">
            <input type="file" id="filePicker" style="display:none" onchange="uploadToDrive(this)">
            <button class="btn-attach" onclick="document.getElementById('filePicker').click()">📎 Attach File</button>
            <div id="uploadLabel" style="font-size: 13px; font-weight: 600;">No file selected</div>
            <div id="progressWrapper" class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead><tr><th style="width:20%">Date</th><th style="width:65%">Notes</th><th class="hide-pdf">Action</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // *** උඹේ APPS SCRIPT URL එක මෙතනට දාපන් ***
    const SCRIPT_URL = "මhttps://script.google.com/macros/s/AKfycbwyIs3j4Tro52nmSARTL807o7i7j-2JCmLCMRXuv2g_zR8C_x0LNZkoIAskHqIlW2IGQg/exec";

    window.onload = refreshDisplay;

    // JSONP ක්‍රමයට දත්ත ගමු (මේක අනිවාර්යයෙන් වැඩ කරනවා)
    function refreshDisplay() {
        const container = document.getElementById("tableBody");
        container.innerHTML = "<tr><td colspan='3' style='text-align:center;'>Syncing...</td></tr>";

        const oldScript = document.getElementById('jsonpScript');
        if (oldScript) oldScript.remove();

        const script = document.createElement('script');
        script.id = 'jsonpScript';
        // Apps Script එකේ doGet එකට ?callback=handleData කියලා යවනවා
        script.src = SCRIPT_URL + "?callback=handleData&t=" + new Date().getTime();
        document.body.appendChild(script);
    }

    // Apps Script එකෙන් දත්ත එවන්නේ මේ function එකට
    function handleData(db) {
        const container = document.getElementById("tableBody");
        document.getElementById("entryCount").innerText = `${db.length} Entries`;
        container.innerHTML = "";
        
        if(db.length === 0) {
            container.innerHTML = "<tr><td colspan='3' style='text-align:center;'>No notes found.</td></tr>";
            return;
        }

        db.slice().reverse().forEach((note) => {
            container.innerHTML += `
                <tr class="note-row">
                    <td>${note.stamp}</td>
                    <td>${formatContent(note.content)}</td>
                    <td class="hide-pdf"><button class="btn-delete" onclick="alert('Sheet එකෙන් මකන්න.')">Remove</button></td>
                </tr>`;
        });
    }

    function saveNote() {
        const input = document.getElementById("noteInput");
        const btn = document.getElementById("addBtn");
        if (!input.value.trim()) return;

        btn.disabled = true;
        btn.innerText = "Saving...";

        const data = {
            action: "saveNote",
            stamp: new Date().toLocaleString('en-GB'),
            content: input.value
        };

        // POST Request එක
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors", // Redirect ප්‍රශ්න එන නිසා මේක වැදගත්
            body: JSON.stringify(data)
        }).then(() => {
            input.value = "";
            btn.disabled = false;
            btn.innerText = "Add Note";
            setTimeout(refreshDisplay, 2000); // පොඩි වෙලාවක් දීලා refresh කරමු
        }).catch(err => alert("Save Error!"));
    }

    function uploadToDrive(input) {
        if (!input.files[0]) return;
        const file = input.files[0];
        const label = document.getElementById('uploadLabel');
        label.innerText = "Uploading...";

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64 = e.target.result.split(',')[1];
            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ base64: base64, type: file.type, name: file.name })
            })
            .then(res => res.json())
            .then(res => {
                const fileTag = `[FILE]${file.name}|${res.downloadUrl}`;
                document.getElementById('noteInput').value += (document.getElementById('noteInput').value ? "\n" : "") + fileTag;
                label.innerText = "✅ Done!";
            });
        };
        reader.readAsDataURL(file);
    }

    function formatContent(text) {
        if(!text) return "";
        return text.split('\n').map(line => {
            if (line.includes("[FILE]")) {
                const parts = line.replace("[FILE]", "").split("|");
                return `<div class="file-box">📁 ${parts[0]} <br> <a href="${parts[1]}" target="_blank">Download</a></div>`;
            }
            return line;
        }).join('<br>');
    }

    function searchTable() {
        const q = document.getElementById("searchBar").value.toLowerCase();
        document.querySelectorAll(".note-row").forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(q) ? "" : "none";
        });
    }

    function exportPDF() {
        const element = document.getElementById('captureRegion');
        document.body.classList.add('pdf-mode');
        html2pdf().from(element).save().then(() => document.body.classList.remove('pdf-mode'));
    }
</script>
</body>
</html>
